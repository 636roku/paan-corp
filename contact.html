<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title data-i18n="page.contact.title">お問い合わせ | 株式会社PAAN</title>
<meta name="description" data-i18n-attr="content:page.contact.description" content="株式会社PAANへのお問い合わせ。">
<meta name="theme-color" content="#1A2E5C">
<meta property="og:type" content="article">
<meta property="og:title" data-i18n-attr="content:page.contact.title" content="お問い合わせ | 株式会社PAAN">
<meta property="og:description" data-i18n-attr="content:page.contact.description" content="株式会社PAANへのお問い合わせ。">
<meta property="og:url" content="https://paan.co.jp/contact">

<link rel="icon" type="image/svg+xml" href="/favicon.svg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Playfair+Display:wght@400;500;600&family=Noto+Serif+JP:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/style.css">
<script src="/i18n.js" defer></script>
<script src="/header-footer.js" defer></script>
</head>
<body data-site="paan">

<div id="site-header"></div>

<main class="page-wrap">

  <div class="page-eyebrow" data-i18n="page.contact.eyebrow">Contact</div>
  <h1 class="page-title" data-i18n="page.contact.page_title">お問い合わせ</h1>

  <p class="contact-lead" data-i18n="page.contact.lead">
    事業提携、 取材、 採用、 その他のお問い合わせは、 下記メールアドレスまでご連絡ください。
  </p>

  <section class="info-section">
    <div class="contact-card">
      <div class="contact-card-eyebrow" data-i18n="page.contact.email_eyebrow">Email</div>
      <a href="mailto:info@paan.co.jp" class="contact-email">info@paan.co.jp</a>
      <p class="contact-note" data-i18n="page.contact.email_note">
        営業日 3 営業日以内のご返信を心がけております。
      </p>
    </div>
  </section>

  <section class="info-section">
    <h2 class="info-h" data-i18n="page.contact.inquiry_h">お問い合わせ種別</h2>

    <div class="inquiry-grid">
      <div class="inquiry-item">
        <div class="inquiry-title" data-i18n="page.contact.inquiry_1_title">事業提携・パートナーシップ</div>
        <p class="inquiry-body" data-i18n="page.contact.inquiry_1_body"></p>
      </div>
      <div class="inquiry-item">
        <div class="inquiry-title" data-i18n="page.contact.inquiry_2_title">取材・メディアのご依頼</div>
        <p class="inquiry-body" data-i18n="page.contact.inquiry_2_body"></p>
      </div>
      <div class="inquiry-item">
        <div class="inquiry-title" data-i18n="page.contact.inquiry_3_title">採用・キャリア</div>
        <p class="inquiry-body" data-i18n="page.contact.inquiry_3_body"></p>
      </div>
      <div class="inquiry-item">
        <div class="inquiry-title" data-i18n="page.contact.inquiry_4_title">プロダクトに関するご質問</div>
        <p class="inquiry-body" data-i18n="page.contact.inquiry_4_body"></p>
      </div>
    </div>
  </section>

</main>

<div id="site-footer"></div>

</body>
</html>

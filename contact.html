<body data-site="paan">

<div id="site-header"></div>

<!-- HERO (v30: アイラ島 灯台 = contact = navigation) -->
<section class="sub-hero sub-hero-contact">
  <div class="page-eyebrow" data-i18n="page.contact.eyebrow">Contact</div>
  <h1 class="page-title" data-i18n="page.contact.page_title">お問い合わせ</h1>
</section>

<main class="page-wrap">

  <p class="contact-lead" data-i18n="page.contact.lead">
    事業提携、 取材、 採用、 その他のお問い合わせは、 下記メールアドレスまでご連絡ください。
  </p>

  <section class="info-section">
    <div class="contact-card">
      <div class="contact-card-eyebrow" data-i18n="page.contact.email_eyebrow">Email</div>
      <a href="mailto:info@paan.co.jp" class="contact-email">info@paan.co.jp</a>
      <p class="contact-note" data-i18n="page.contact.email_note">
        営業日 3 営業日以内のご返信を心がけております。
      </p>
    </div>
  </section>

  <section class="info-section">
    <h2 class="info-h" data-i18n="page.contact.inquiry_h">お問い合わせ種別</h2>

    <div class="inquiry-grid">
      <div class="inquiry-item">
        <div class="inquiry-title" data-i18n="page.contact.inquiry_1_title">事業提携・パートナーシップ</div>
        <p class="inquiry-body" data-i18n="page.contact.inquiry_1_body"></p>
      </div>
      <div class="inquiry-item">
        <div class="inquiry-title" data-i18n="page.contact.inquiry_2_title">取材・メディアのご依頼</div>
        <p class="inquiry-body" data-i18n="page.contact.inquiry_2_body"></p>
      </div>
      <div class="inquiry-item">
        <div class="inquiry-title" data-i18n="page.contact.inquiry_3_title">採用・キャリア</div>
        <p class="inquiry-body" data-i18n="page.contact.inquiry_3_body"></p>
      </div>
      <div class="inquiry-item">
        <div class="inquiry-title" data-i18n="page.contact.inquiry_4_title">プロダクトに関するご質問</div>
        <p class="inquiry-body" data-i18n="page.contact.inquiry_4_body"></p>
      </div>
    </div>
  </section>

</main>

<div id="site-footer"></div>

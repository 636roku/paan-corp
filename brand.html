<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title data-i18n="page.brand.title">ブランド | 株式会社PAAN</title>
<meta name="description" data-i18n-attr="content:page.brand.description" content="株式会社PAANが運営するブランド一覧。">
<meta name="theme-color" content="#1A2E5C">
<meta property="og:type" content="article">
<meta property="og:title" data-i18n-attr="content:page.brand.title" content="ブランド | 株式会社PAAN">
<meta property="og:description" data-i18n-attr="content:page.brand.description" content="MENU-PAAN — メニューの向こう側へ。">
<meta property="og:url" content="https://paan.co.jp/brand">

<link rel="icon" type="image/svg+xml" href="/favicon.svg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Playfair+Display:wght@400;500;600&family=Noto+Serif+JP:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/style.css">
<script src="/i18n.js" defer></script>
<script src="/header-footer.js" defer></script>
</head>
<body data-site="paan">

<div id="site-header"></div>

<main class="page-wrap">

  <div class="page-eyebrow" data-i18n="page.brand.eyebrow">Our Brands</div>
  <h1 class="page-title" data-i18n="page.brand.page_title">PAAN シリーズ</h1>

  <section class="info-section">
    <h2 class="info-h" data-i18n="page.brand.first_h">第1弾</h2>

    <article class="brand-card brand-card--menupaan">
      <div class="brand-card-status">
        <span class="status-dot status-dot-live" aria-hidden="true"></span>
        <span data-i18n="page.brand.menupaan_status">2026 年 6 月 3 日 ローンチ予定</span>
      </div>

      <h3 class="brand-card-name" data-i18n="page.brand.menupaan_name">MENU-PAAN</h3>
      <p class="brand-card-tagline" data-i18n="page.brand.menupaan_tagline">メニューの向こう側へ。</p>

      <div class="brand-card-body">
        <p data-i18n="page.brand.menupaan_desc"></p>
        <ul class="brand-features">
          <li><strong data-i18n="page.brand.menupaan_feature_langs_label">対応 12 言語:</strong> <span data-i18n="page.brand.menupaan_feature_langs_value"></span></li>
          <li><strong data-i18n="page.brand.menupaan_feature_func_label">主要機能:</strong> <span data-i18n="page.brand.menupaan_feature_func_value"></span></li>
          <li><strong data-i18n="page.brand.menupaan_feature_form_label">提供形態:</strong> <span data-i18n="page.brand.menupaan_feature_form_value"></span></li>
        </ul>
      </div>

      <div class="brand-card-cta">
        <a href="https://www.menupaan.com" class="brand-cta-primary brand-cta-primary--menupaan" target="_blank" rel="noopener">
          <span data-i18n="page.brand.menupaan_cta_open">MENU-PAAN を開く</span>
          <span class="cta-arrow" aria-hidden="true">→</span>
        </a>
        <a href="https://www.menupaan.com/mission" class="brand-cta-secondary" target="_blank" rel="noopener" data-i18n="page.brand.menupaan_cta_story">
          ストーリーを読む
        </a>
      </div>
    </article>
  </section>

  <section class="info-section">
    <h2 class="info-h" data-i18n="page.brand.others_h">その他の PAAN シリーズ</h2>

    <article class="brand-card">
      <div class="brand-card-status">
        <span class="status-dot status-dot-soon" aria-hidden="true"></span>
        <span data-i18n="page.brand.others_status">開発中</span>
      </div>
      <h3 class="brand-card-name-sm" data-i18n="page.brand.others_name">PAAN シリーズ 第 2 弾以降</h3>
      <div class="brand-card-body" style="margin-top:18px;">
        <p data-i18n="page.brand.others_desc"></p>
      </div>
    </article>
  </section>

</main>

<div id="site-footer"></div>

</body>
</html>

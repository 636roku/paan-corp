<body data-site="paan">

<div id="site-header"></div>

<!-- HERO (v30: アイラ島 夕陽の海岸 = brand) -->
<section class="sub-hero sub-hero-brand">
  <div class="page-eyebrow" data-i18n="page.brand.eyebrow">Our Brands</div>

  <section class="info-section">
    <h2 class="info-h" data-i18n="page.brand.first_h">プロダクト</h2>

    <article class="brand-card">
      <div class="brand-card-status">
        <span class="status-dot status-dot-soon" aria-hidden="true"></span>
        <span data-i18n="page.brand.menupaan_status">開発中</span>
      </div>

      <h3 class="brand-card-name-sm" data-i18n="page.brand.menupaan_name">最初のプロダクト</h3>

      <div class="brand-card-body">
        <p data-i18n="page.brand.menupaan_desc"></p>
        <ul class="brand-features">
          <li><strong data-i18n="page.brand.menupaan_feature_langs_label">想定対応言語</strong> <span data-i18n="page.brand.menupaan_feature_langs_value"></span></li>

  <section class="info-section">
    <h2 class="info-h" data-i18n="page.brand.others_h">PAAN シリーズ</h2>

    <article class="brand-card">
      <div class="brand-card-status">
        <span class="status-dot status-dot-soon" aria-hidden="true"></span>
        <span data-i18n="page.brand.others_status">開発中</span>
      </div>
      <h3 class="brand-card-name-sm" data-i18n="page.brand.others_name">PAAN シリーズ 第 2 弾以降</h3>
      <div class="brand-card-body" style="margin-top:18px;">
        <p data-i18n="page.brand.others_desc"></p>
      </div>
    </article>
  </section>
